<!DOCTYPE html>
<!--
  Atlas — Splash (Explore Worlds)
  DESIGN MOCKUP ONLY. Standalone HTML/CSS reusing the real Atlas chrome
  (light Topbar + dark left Toolbar) via _atlas-chrome.css. Not wired into the app.
  Mission/theme shortcuts link to /search?view=<id>; "Everything" links to /search.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atlas — Splash (Explore Worlds)</title>
<link rel="stylesheet" href="_atlas-chrome.css" />
<style>

  .sbar { display: flex; align-items: center; gap: 10px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 26px; padding: 10px 16px;
    box-shadow: 0 3px 12px rgba(0,0,0,.07); }
  .sbar.big { padding: 14px 20px; border-radius: 30px; box-shadow: 0 6px 22px rgba(0,0,0,.10); }
  .sbar svg { width: 22px; height: 22px; fill: var(--muted); flex: none; }
  .sbar.big svg { width: 24px; height: 24px; }
  .sbar input { border: none; outline: none; flex: 1; font-size: 15px; color: var(--text); background: none; font-family: inherit; }
  .sbar.big input { font-size: 17px; }
  .sbar .go { background: var(--blue); color: #fff; border: none; border-radius: 20px; padding: 8px 20px; font-weight: 700; font-size: 13px; cursor: pointer; }

  .m20 { background: radial-gradient(circle at 66% 42%, #c1553a, #7a2e1c 60%, #3a1a10); }
  .msl { background: radial-gradient(circle at 34% 46%, #d08a4a, #8a4a1f 60%, #3a1e0c); }
  .insight { background: radial-gradient(circle at 55% 55%, #b76a44, #5f2f1c 60%, #2a160d); }
  .mro { background: radial-gradient(circle at 50% 38%, #9a5638, #5a2c1a 60%, #22110a); }
  .cassini { background: radial-gradient(circle at 60% 45%, #d9c48a, #9a7f45 55%, #3a3018); }
  .lro { background: radial-gradient(circle at 46% 50%, #cfd2d6, #7c8085 60%, #34383c); }
  .moon { background: radial-gradient(circle at 44% 48%, #d7d9dc, #8a8d92 60%, #3a3d42); }
  .saturn { background: radial-gradient(circle at 55% 45%, #e6d5a6, #b9a05f 58%, #4a3f22); }
  .jezero { background: radial-gradient(circle at 40% 60%, #cf7f4e, #8a3f22 60%, #2c150b); }
  .ingenuity { background: radial-gradient(circle at 60% 40%, #7fb3e0, #38618f 60%, #16283f); }
  .dust { background: radial-gradient(circle at 50% 50%, #e0a86a, #9a5a2a 55%, #35200f); }
  .apollo { background: radial-gradient(circle at 45% 45%, #c9ccd0, #75787d 60%, #2c2f33); }
  .europa { background: radial-gradient(circle at 52% 48%, #e8ddc7, #b7986a 55%, #4a3a24); }
  .all { background: conic-gradient(from 210deg, #1c67e3, #c1553a, #d9c48a, #1c67e3); }

  .stage { position: relative; background:
      radial-gradient(1000px 500px at 50% -30%, rgba(28,103,227,.12), transparent 60%),
      linear-gradient(180deg,#ffffff,#eef1f6); border-bottom: 1px solid var(--border); }
  .stage .inner { max-width: 1120px; margin: 0 auto; padding: 40px 26px 30px; text-align: center; }
  .stage h1 { font-size: 28px; font-weight: 800; margin: 0 0 8px; }
  .stage p { color: var(--muted); font-size: 14px; margin: 0 0 22px; }
  .sbar { max-width: 560px; margin: 0 auto; }
  .orbits { position: relative; height: 300px; margin-top: 10px; }
  .body { position: absolute; text-decoration: none; text-align: center; transform: translate(-50%,-50%); transition: transform .15s; }
  .body:hover { transform: translate(-50%,-50%) scale(1.08); }
  .body .planet { border-radius: 50%; margin: 0 auto 7px; box-shadow: 0 6px 18px rgba(0,0,0,.18), inset 0 0 0 1px rgba(0,0,0,.06); }
  .body .name { font-size: 13px; font-weight: 700; color: var(--text); }
  .body .n { font-size: 11px; color: var(--muted); }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 26px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .row a { text-decoration: none; color: var(--text-2); background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 7px 14px; font-size: 13px; display:inline-flex; align-items:center; gap:8px; }
  .row a:hover { border-color: var(--blue); color: var(--blue); }
  .row a .dot { width: 14px; height: 14px; border-radius: 50%; }
  .row a.everything { border-color: var(--blue); color: var(--blue); font-weight: 700; }

</style>
</head>
<body>
<div class="app">
<nav class="rail"><div class="group"><button class="rbtn" title="Navigation" aria-label="navigation"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button><div class="rdiv"></div><button class="rbtn" title="Home" aria-label="home"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button><button class="rbtn active" title="Image Search" aria-label="image search"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button><button class="rbtn" title="Archive Explorer" aria-label="archive explorer"><svg viewBox="0 0 24 24"><path d="M22 11V3h-7v3H9V3H2v8h7V8h2v10h4v3h7v-8h-7v3h-2V8h2v3z"/></svg></button></div><div class="group"><div class="rdiv"></div><button class="rbtn" title="Help" aria-label="help"><svg viewBox="0 0 24 24"><path d="M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/></svg></button><button class="rbtn" title="Info" aria-label="info"><svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></button></div></nav>
<div class="main">
<header class="topbar"><div class="tleft"><div class="logo"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="46" fill="#0B3D91"/><path d="M18 55 Q50 30 84 46" stroke="#fff" stroke-width="2" fill="none" opacity=".55"/><path d="M20 60 C45 48 60 52 82 40 C70 62 40 70 20 60 Z" fill="#FC3D21"/><text x="50" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#fff" letter-spacing="1">NASA</text></svg></div><div class="titles"><div class="node"><a class="pds">PDS</a><a class="cis">Cartography and Imaging Sciences</a></div><div class="appline"><h1 class="appname">ATLAS</h1></div></div></div><div class="tright" style="align-items:center"><button class="tbtn" title="API Documentation" aria-label="api docs"><svg viewBox="0 0 24 24"><path d="M7 7H5A2 2 0 0 0 3 9V17H5V13H7V17H9V9A2 2 0 0 0 7 7M7 11H5V9H7M14 7H10V17H12V13H14A2 2 0 0 0 16 11V9A2 2 0 0 0 14 7M14 11H12V9H14M20 9V15H21V17H17V15H18V9H17V7H21V9Z"/></svg></button><button class="tbtn" title="Image Search" aria-label="image search"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button><button class="tbtn" title="Archive Explorer" aria-label="archive explorer"><svg viewBox="0 0 24 24"><path d="M22 11V3h-7v3H9V3H2v8h7V8h2v10h4v3h7v-8h-7v3h-2V8h2v3z"/></svg></button><button class="tbtn" title="Cart" aria-label="cart"><svg viewBox="0 0 24 24"><path d="M15.55 13c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.37-.66-.11-1.48-.87-1.48H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.45C3.52 15.37 4.48 17 6 17h12v-2H6l1.1-2h8.45zM6.16 6h12.15l-2.76 5H8.53L6.16 6zM6 18c-1.1 0-1.99.9-1.99 2S4.9 22 6 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg><span class="badge">3</span></button></div></header>
<main class="content">

  <section class="stage"><div class="inner">
    <h1>Explore by world</h1>
    <p>Choose a target body, or search across the whole archive.</p>
    <div class="sbar big"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><input placeholder="Search a target, feature, or mission…" /><button class="go">Search</button></div>
    <div class="orbits">
      <a class="body" href="/search?target=mars" style="left:26%;top:44%"><div class="planet m20" style="width:120px;height:120px"></div><div class="name">Mars</div><div class="n">98M products</div></a>
      <a class="body" href="/search?target=moon" style="left:52%;top:30%"><div class="planet moon" style="width:70px;height:70px"></div><div class="name">Moon</div><div class="n">21M</div></a>
      <a class="body" href="/search?target=saturn" style="left:74%;top:52%"><div class="planet saturn" style="width:96px;height:96px"></div><div class="name">Saturn</div><div class="n">3.9M</div></a>
      <a class="body" href="/search?target=jupiter" style="left:90%;top:30%"><div class="planet europa" style="width:56px;height:56px"></div><div class="name">Jupiter</div><div class="n">2.3M</div></a>
      <a class="body" href="/search?target=mercury" style="left:40%;top:74%"><div class="planet mro" style="width:52px;height:52px"></div><div class="name">Mercury</div><div class="n">1.1M</div></a>
    </div>
  </div></section>
  <div class="wrap">
    <div class="row">
      <a href="/search?view=m20"><span class="dot m20"></span>Mars 2020</a>
      <a href="/search?view=cassini_grand_finale"><span class="dot saturn"></span>Cassini Grand Finale</a>
      <a href="/search?view=apollo_pans"><span class="dot apollo"></span>Apollo panoramas</a>
      <a href="/search?view=lro"><span class="dot lro"></span>LRO</a>
      <a class="everything" href="/search"><span class="dot all"></span>Everything</a>
    </div>
  </div>

</main>
</div>
</div>
</body>
</html>
