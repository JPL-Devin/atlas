<!DOCTYPE html>
<!--
  Atlas — Photo Hero (bottom)
  DESIGN MOCKUP ONLY. Standalone HTML/CSS reusing the Atlas chrome
  (white NASA topbar + dark left toolbar) via _atlas-chrome.css.
  Small chrome tweaks per concept; nothing wired into the app.
-->
<html lang="en"><head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atlas — Photo Hero (bottom)</title>
<link rel="stylesheet" href="_atlas-chrome.css" />
<style>
.topbar .tmode { display:flex; align-items:center; margin-right:6px; font-size:11px; font-weight:700; color:#1c67e3; background:#eef4fe; border:1px solid #cfe0fb; border-radius:12px; padding:3px 10px; letter-spacing:.5px; text-transform:uppercase; align-self:center; }
.topbar .tsearch { flex:1; display:flex; align-items:center; max-width:520px; margin:0 auto; align-self:center; background:#fff; border:1px solid var(--border); border-radius:16px; height:26px; padding:0 12px; gap:8px; color:var(--muted); font-size:12.5px; }
.topbar .tsearch svg { width:15px; height:15px; fill:var(--muted); }
.app { height:760px; }

  .p-mars { background: radial-gradient(circle at 38% 34%, #d98a5a, #a04a24 55%, #3a1c0e); }
  .p-moon { background: radial-gradient(circle at 42% 40%, #d7dade, #8b8f95 58%, #34383c); }
  .p-saturn { background: radial-gradient(circle at 55% 42%, #e9d9ac, #bda368 55%, #4c4026); }
  .p-jupiter { background: radial-gradient(circle at 45% 40%, #e6c9a3, #b07c4e 55%, #4a2f1a); }
  .p-mercury { background: radial-gradient(circle at 45% 42%, #c4c0b8, #7c766c 58%, #322e28); }
  .p-europa { background: radial-gradient(circle at 52% 46%, #e9e0cf, #b6a281 55%, #4a3d28); }
  .p-jezero { background: radial-gradient(circle at 40% 60%, #cf7f4e, #8a3f22 60%, #2c150b); }
  .p-ingenuity { background: radial-gradient(circle at 60% 40%, #7fb3e0, #38618f 60%, #16283f); }
  .p-dust { background: radial-gradient(circle at 50% 50%, #e0a86a, #9a5a2a 55%, #35200f); }
  .p-cassini { background: radial-gradient(circle at 55% 45%, #e6d5a6, #b9a05f 58%, #4a3f22); }
  .p-apollo { background: radial-gradient(circle at 45% 45%, #c9ccd0, #75787d 60%, #2c2f33); }
  .p-all { background: conic-gradient(from 210deg, #1c67e3, #c1553a, #d9c48a, #1c67e3); }
  .p-stars { background:
     radial-gradient(1.2px 1.2px at 18% 30%, #fff, transparent),
     radial-gradient(1.4px 1.4px at 62% 18%, #fff, transparent),
     radial-gradient(1px 1px at 82% 62%, #cfe0ff, transparent),
     radial-gradient(1.6px 1.6px at 34% 74%, #fff, transparent),
     radial-gradient(1px 1px at 50% 44%, #9ec1ff, transparent),
     radial-gradient(1.2px 1.2px at 72% 82%, #fff, transparent),
     radial-gradient(1200px 700px at 78% 8%, #12233f, transparent),
     radial-gradient(900px 600px at 12% 96%, #23122a, transparent),
     linear-gradient(160deg, #05070d, #0a1020 60%, #060810); }

  .sb { display:flex; align-items:center; gap:10px; background:#fff; border:1px solid var(--border);
    border-radius:26px; height:52px; padding:0 8px 0 18px; box-shadow:0 6px 22px rgba(0,0,0,.12); }
  .sb .ic svg { width:20px; height:20px; fill:var(--muted); display:block; }
  .sb input { flex:1; border:none; outline:none; font-size:15px; font-family:inherit; background:transparent; color:var(--text); }
  .sb .go { width:38px; height:38px; border:none; border-radius:50%; background:var(--blue); color:#fff; cursor:pointer; display:grid; place-items:center; }
  .sb .go svg { width:22px; height:22px; fill:#fff; }

  .content { padding:0; display:flex; flex-direction:column; }
  .hero { position:relative; flex:1; min-height:560px; display:flex; align-items:flex-end; overflow:hidden; }
  .hero .bg { position:absolute; inset:0; }
  .hero::before { content:""; position:absolute; inset:0; z-index:1; background: linear-gradient(0deg, rgba(0,0,0,.78) 0%, rgba(0,0,0,.15) 55%, rgba(0,0,0,.25) 100%); }
  .hero .inner { position:relative; z-index:2; width:100%; padding:0 46px 44px; color:#fff; }
  .hero h1 { font-size:40px; font-weight:800; margin:0 0 6px; max-width:620px; }
  .hero p { font-size:15px; opacity:.9; margin:0 0 20px; max-width:560px; }
  .hero .sb { max-width:640px; }
  .row { display:flex; gap:14px; margin-top:24px; overflow:hidden; }
  .row a { flex:1; text-decoration:none; color:#fff; border-radius:12px; overflow:hidden; position:relative; height:96px; display:flex; align-items:flex-end; box-shadow:inset 0 0 0 1px rgba(255,255,255,.15); }
  .row a .t { position:relative; z-index:2; padding:10px 12px; font-weight:700; font-size:13.5px; text-shadow:0 1px 6px rgba(0,0,0,.6); }
  .row a .th { position:absolute; inset:0; }
  .row a::after { content:""; position:absolute; inset:0; z-index:1; background:linear-gradient(0deg, rgba(0,0,0,.55), transparent); }

</style>
</head><body>

<div class="main">
<header class="topbar"><div class="tleft"><div class="logo"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="46" fill="#0B3D91"/><path d="M18 55 Q50 30 84 46" stroke="#fff" stroke-width="2" fill="none" opacity=".55"/><path d="M20 60 C45 48 60 52 82 40 C70 62 40 70 20 60 Z" fill="#FC3D21"/><text x="50" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#fff" letter-spacing="1">NASA</text></svg></div><div class="titles"><div class="node"><a class="pds">PDS</a><a class="cis">Cartography and Imaging Sciences</a></div><div class="appline"><h1 class="appname">ATLAS</h1></div></div></div><div class="tright"><button class="tbtn" title="API" aria-label="api"><svg viewBox="0 0 24 24"><path d="M7 7H5A2 2 0 0 0 3 9V17H5V13H7V17H9V9A2 2 0 0 0 7 7M7 11H5V9H7M14 7H10V17H12V13H14A2 2 0 0 0 16 11V9A2 2 0 0 0 14 7M14 11H12V9H14M20 9V15H21V17H17V15H18V9H17V7H21V9Z"/></svg></button><button class="tbtn" title="Image Search" aria-label="image search"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button><button class="tbtn" title="Archive Explorer" aria-label="archive explorer"><svg viewBox="0 0 24 24"><path d="M22 11V3h-7v3H9V3H2v8h7V8h2v10h4v3h7v-8h-7v3h-2V8h2v3z"/></svg></button><button class="tbtn" title="Cart" aria-label="cart"><svg viewBox="0 0 24 24"><path d="M15.55 13c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.37-.66-.11-1.48-.87-1.48H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.45C3.52 15.37 4.48 17 6 17h12v-2H6l1.1-2h8.45zM6.16 6h12.15l-2.76 5H8.53L6.16 6zM6 18c-1.1 0-1.99.9-1.99 2S4.9 22 6 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg><span class="badge">3</span></button></div></header>
