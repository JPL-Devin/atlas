<!DOCTYPE html>
<!--
  Atlas — Orbit map
  DESIGN MOCKUP ONLY. Standalone HTML/CSS reusing the Atlas chrome
  (white NASA topbar + dark left toolbar) via _atlas-chrome.css.
  Small chrome tweaks per concept; nothing wired into the app.
-->
<html lang="en"><head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atlas — Orbit map</title>
<link rel="stylesheet" href="_atlas-chrome.css" />
<style>
.topbar .tmode { display:flex; align-items:center; margin-right:6px; font-size:11px; font-weight:700; color:#1c67e3; background:#eef4fe; border:1px solid #cfe0fb; border-radius:12px; padding:3px 10px; letter-spacing:.5px; text-transform:uppercase; align-self:center; }
.topbar .tsearch { flex:1; display:flex; align-items:center; max-width:520px; margin:0 auto; align-self:center; background:#fff; border:1px solid var(--border); border-radius:16px; height:26px; padding:0 12px; gap:8px; color:var(--muted); font-size:12.5px; }
.topbar .tsearch svg { width:15px; height:15px; fill:var(--muted); }
.app { height:760px; }

  .p-mars { background: radial-gradient(circle at 38% 34%, #d98a5a, #a04a24 55%, #3a1c0e); }
  .p-moon { background: radial-gradient(circle at 42% 40%, #d7dade, #8b8f95 58%, #34383c); }
  .p-saturn { background: radial-gradient(circle at 55% 42%, #e9d9ac, #bda368 55%, #4c4026); }
  .p-jupiter { background: radial-gradient(circle at 45% 40%, #e6c9a3, #b07c4e 55%, #4a2f1a); }
  .p-mercury { background: radial-gradient(circle at 45% 42%, #c4c0b8, #7c766c 58%, #322e28); }
  .p-europa { background: radial-gradient(circle at 52% 46%, #e9e0cf, #b6a281 55%, #4a3d28); }
  .p-jezero { background: radial-gradient(circle at 40% 60%, #cf7f4e, #8a3f22 60%, #2c150b); }
  .p-ingenuity { background: radial-gradient(circle at 60% 40%, #7fb3e0, #38618f 60%, #16283f); }
  .p-dust { background: radial-gradient(circle at 50% 50%, #e0a86a, #9a5a2a 55%, #35200f); }
  .p-cassini { background: radial-gradient(circle at 55% 45%, #e6d5a6, #b9a05f 58%, #4a3f22); }
  .p-apollo { background: radial-gradient(circle at 45% 45%, #c9ccd0, #75787d 60%, #2c2f33); }
  .p-all { background: conic-gradient(from 210deg, #1c67e3, #c1553a, #d9c48a, #1c67e3); }
  .p-stars { background:
     radial-gradient(1.2px 1.2px at 18% 30%, #fff, transparent),
     radial-gradient(1.4px 1.4px at 62% 18%, #fff, transparent),
     radial-gradient(1px 1px at 82% 62%, #cfe0ff, transparent),
     radial-gradient(1.6px 1.6px at 34% 74%, #fff, transparent),
     radial-gradient(1px 1px at 50% 44%, #9ec1ff, transparent),
     radial-gradient(1.2px 1.2px at 72% 82%, #fff, transparent),
     radial-gradient(1200px 700px at 78% 8%, #12233f, transparent),
     radial-gradient(900px 600px at 12% 96%, #23122a, transparent),
     linear-gradient(160deg, #05070d, #0a1020 60%, #060810); }

  .sb { display:flex; align-items:center; gap:10px; background:#fff; border:1px solid var(--border);
    border-radius:26px; height:52px; padding:0 8px 0 18px; box-shadow:0 6px 22px rgba(0,0,0,.12); }
  .sb .ic svg { width:20px; height:20px; fill:var(--muted); display:block; }
  .sb input { flex:1; border:none; outline:none; font-size:15px; font-family:inherit; background:transparent; color:var(--text); }
  .sb .go { width:38px; height:38px; border:none; border-radius:50%; background:var(--blue); color:#fff; cursor:pointer; display:grid; place-items:center; }
  .sb .go svg { width:22px; height:22px; fill:#fff; }

  .content { padding:0; display:flex; flex-direction:column; }
  .stage { position:relative; flex:1; min-height:600px; overflow:hidden; color:#fff; }
  .stage .bg { position:absolute; inset:0; }
  .head { position:relative; z-index:3; text-align:center; padding:26px 20px 0; }
  .head h1 { font-size:26px; font-weight:800; margin:0; text-shadow:0 2px 12px rgba(0,0,0,.5); }
  .head p { opacity:.85; margin:6px 0 0; font-size:13.5px; }
  .orbit { position:relative; z-index:2; height:520px; }
  .sun { position:absolute; left:50%; top:52%; transform:translate(-50%,-50%); width:120px; height:120px; border-radius:50%;
    background:radial-gradient(circle at 45% 40%, #fff6d8, #ffce54 55%, #e8892b); box-shadow:0 0 70px rgba(255,180,60,.6); display:grid; place-items:center; }
  .sun a { color:#3a2600; font-weight:800; font-size:12px; text-decoration:none; text-align:center; }
  .ring { position:absolute; left:50%; top:52%; transform:translate(-50%,-50%); border:1px dashed rgba(255,255,255,.18); border-radius:50%; }
  .body { position:absolute; transform:translate(-50%,-50%); text-align:center; text-decoration:none; color:#fff; }
  .body .globe { width:var(--s); height:var(--s); border-radius:50%; box-shadow: inset -6px -6px 14px rgba(0,0,0,.5), 0 4px 16px rgba(0,0,0,.4); margin:0 auto; transition:transform .15s; }
  .body:hover .globe { transform:scale(1.12); }
  .body .lb { display:block; margin-top:7px; font-size:12.5px; font-weight:700; text-shadow:0 1px 6px rgba(0,0,0,.7); }
  .body .ct { font-size:10.5px; opacity:.8; }
  .foot { position:relative; z-index:3; text-align:center; padding:0 20px 26px; }
  .foot a { color:#dce8ff; font-weight:600; font-size:13px; text-decoration:none; border-bottom:1px solid rgba(220,232,255,.4); }

</style>
</head><body>
<div class="app">
<nav class="rail"><div class="group"><button class="rbtn" title="Navigation" aria-label="navigation"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button><div class="rdiv"></div><button class="rbtn" title="Worlds" aria-label="worlds"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93C7.06 19.43 4 16.07 4 12c0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41C17.92 5.77 20 8.65 20 12c0 2.08-.81 3.98-2.1 5.39z"/></svg></button><button class="rbtn" title="Image Search" aria-label="image search"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button><button class="rbtn" title="Archive Explorer" aria-label="archive explorer"><svg viewBox="0 0 24 24"><path d="M22 11V3h-7v3H9V3H2v8h7V8h2v10h4v3h7v-8h-7v3h-2V8h2v3z"/></svg></button><button class="rbtn" title="Timeline" aria-label="timeline"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg></button></div><div class="group"><div class="rdiv"></div><button class="rbtn" title="Help" aria-label="help"><svg viewBox="0 0 24 24"><path d="M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/></svg></button><button class="rbtn" title="Info" aria-label="info"><svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></button></div></nav>
<div class="main">
<header class="topbar"><div class="tleft"><div class="logo"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="46" fill="#0B3D91"/><path d="M18 55 Q50 30 84 46" stroke="#fff" stroke-width="2" fill="none" opacity=".55"/><path d="M20 60 C45 48 60 52 82 40 C70 62 40 70 20 60 Z" fill="#FC3D21"/><text x="50" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#fff" letter-spacing="1">NASA</text></svg></div><div class="titles"><div class="node"><a class="pds">PDS</a><a class="cis">Cartography and Imaging Sciences</a></div><div class="appline"><h1 class="appname">ATLAS</h1></div></div></div><div class="tright"><button class="tbtn" title="API" aria-label="api"><svg viewBox="0 0 24 24"><path d="M7 7H5A2 2 0 0 0 3 9V17H5V13H7V17H9V9A2 2 0 0 0 7 7M7 11H5V9H7M14 7H10V17H12V13H14A2 2 0 0 0 16 11V9A2 2 0 0 0 14 7M14 11H12V9H14M20 9V15H21V17H17V15H18V9H17V7H21V9Z"/></svg></button><button class="tbtn" title="Image Search" aria-label="image search"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button><button class="tbtn" title="Archive Explorer" aria-label="archive explorer"><svg viewBox="0 0 24 24"><path d="M22 11V3h-7v3H9V3H2v8h7V8h2v10h4v3h7v-8h-7v3h-2V8h2v3z"/></svg></button><button class="tbtn" title="Cart" aria-label="cart"><svg viewBox="0 0 24 24"><path d="M15.55 13c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.37-.66-.11-1.48-.87-1.48H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.45C3.52 15.37 4.48 17 6 17h12v-2H6l1.1-2h8.45zM6.16 6h12.15l-2.76 5H8.53L6.16 6zM6 18c-1.1 0-1.99.9-1.99 2S4.9 22 6 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg><span class="badge">3</span></button></div></header>
<main class="content">

  <div class="stage"><div class="bg p-stars"></div>
    <div class="head"><h1>Pick a world</h1><p>Click a body to open its imagery — or search across everything.</p></div>
    <div class="orbit">
      <div class="ring" style="width:230px;height:230px"></div>
      <div class="ring" style="width:420px;height:420px"></div>
      <div class="ring" style="width:640px;height:640px"></div>
      <div class="ring" style="width:880px;height:880px"></div>
      <div class="sun"><a href="/search">All data</a></div>
      <a class="body" href="/search?target=mercury" style="left:50%;top:24%;--s:40px"><span class="globe p-mercury"></span><span class="lb">Mercury</span><span class="ct">1.2M</span></a>
      <a class="body" href="/search?target=mars" style="left:71%;top:40%;--s:66px"><span class="globe p-mars"></span><span class="lb">Mars</span><span class="ct">96M</span></a>
      <a class="body" href="/search?target=moon" style="left:30%;top:66%;--s:58px"><span class="globe p-moon"></span><span class="lb">Moon</span><span class="ct">9.4M</span></a>
      <a class="body" href="/search?target=jupiter" style="left:80%;top:74%;--s:74px"><span class="globe p-jupiter"></span><span class="lb">Jupiter</span><span class="ct">2.3K</span></a>
      <a class="body" href="/search?target=saturn" style="left:16%;top:30%;--s:70px"><span class="globe p-saturn"></span><span class="lb">Saturn</span><span class="ct">3.9M</span></a>

</main>
</div></div>
</body></html>
